<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบจัดการสต็อกสินค้า</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📦 ระบบจัดการสินค้าคงคลัง</h1>

        <div class="card">
            <h2>📋 รายการสินค้าทั้งหมด (เช็ค ID ที่นี่)</h2>
            <button class="btn" onclick="loadAllProducts()">🔄 อัปเดตรายการสินค้า</button>
            <div id="allProductsDisplay" style="margin-top: 15px;"></div>
        </div>

        <div class="card">
            <h2>➕ เพิ่มสินค้าใหม่</h2>
            <input type="text" id="newName" placeholder="ชื่อสินค้า">
            <input type="number" id="newQty" min="1" placeholder="จำนวนเริ่มต้น">
            <button class="btn btn-blue" onclick="addProduct()">บันทึกสินค้าใหม่</button>
        </div>

        <div class="card">
            <h2>🔄 บันทึก การนำเข้า - จ่ายออก</h2>
            <input type="number" id="logId" min="1" placeholder="ใส่ ID สินค้า">
            <select id="logType">
                <option value="IN">นำเข้า (IN)</option>
                <option value="OUT">จ่ายออก (OUT)</option>
            </select>
            <input type="number" id="logAmount" min="1" placeholder="จำนวน">
            <button class="btn btn-green" onclick="updateStock()">บันทึกรายการ</button>
        </div>

        <div class="card">
            <h2>⚠️ สินค้าใกล้หมด (น้อยกว่าหรือเท่ากับ 5 ชิ้น)</h2>
            <button onclick="loadLowStock()">ตรวจสอบตอนนี้</button>
            <div id="lowStockDisplay"></div>
        </div>

        <div class="card">
            <h2>📊 รายงานสรุปยอด</h2>
            <button onclick="loadReport('daily')">สรุปรายวัน</button>
            <button onclick="loadReport('monthly')">สรุปรายเดือน</button>
            <div id="reportDisplay"></div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:3000';

        // โหลดข้อมูลสินค้าทั้งหมดทันทีที่เปิดหน้าเว็บ
        window.onload = loadAllProducts;

        async function loadAllProducts() {
            try {
                const res = await fetch(`${API}/all-products`);
                const data = await res.json();
                
                if (data.length === 0) {
                    document.getElementById('allProductsDisplay').innerHTML = '<p>ยังไม่มีสินค้าในระบบ</p>';
                    return;
                }

                let html = '<table><tr><th>ID</th><th>ชื่อสินค้า</th><th>คงเหลือ</th></tr>';
                data.forEach(item => {
                    html += `<tr>
                                <td><strong>${item.id}</strong></td>
                                <td>${item.name}</td>
                                <td>${item.quantity}</td>
                             </tr>`;
                });
                html += '</table>';
                document.getElementById('allProductsDisplay').innerHTML = html;
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('allProductsDisplay').innerHTML = '<p style="color:red;">เชื่อมต่อเซิร์ฟเวอร์ไม่ได้ (เปิด index.js หรือยัง?)</p>';
            }
        }

        async function addProduct() {
            const name = document.getElementById('newName').value;
            const quantity = parseInt(document.getElementById('newQty').value);
            const min_stock = 5; 

            if (!name || isNaN(quantity) || quantity <= 0) {
                alert("❌ กรุณากรอกชื่อสินค้าและจำนวนที่มากกว่า 0");
                return;
            }

            const data = { name, quantity, min_stock };
            const res = await fetch(`${API}/add-product`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            alert(result.message);
            loadAllProducts(); 
        }

        async function updateStock() {
            const product_id = parseInt(document.getElementById('logId').value);
            const type = document.getElementById('logType').value;
            const amount = parseInt(document.getElementById('logAmount').value);

            if (isNaN(product_id) || product_id <= 0 || isNaN(amount) || amount <= 0) {
                alert("❌ กรุณากรอก ID และจำนวนให้ถูกต้อง (ต้องมากกว่า 0)");
                return;
            }

            const data = { product_id, type, amount };
            const res = await fetch(`${API}/update-stock`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            alert(result.message);
            loadAllProducts(); 
        }

        async function loadLowStock() {
            const res = await fetch(`${API}/low-stock`);
            const data = await res.json();
            let html = '<table><tr><th>ID</th><th>ชื่อ</th><th>คงเหลือ</th></tr>';
            data.forEach(item => {
                html += `<tr class="low-stock"><td>${item.id}</td><td>${item.name}</td><td>${item.quantity}</td></tr>`;
            });
            html += '</table>';
            document.getElementById('lowStockDisplay').innerHTML = data.length ? html : '<p>ไม่มีสินค้าใกล้หมด</p>';
        }

        // --- ส่วนที่แก้ไขตามคำสั่ง (สรุปยอด รายวัน/รายเดือน) ---
        async function loadReport(mode) {
            const path = mode === 'daily' ? '/report-daily' : '/report-monthly';
            const res = await fetch(`${API}${path}`);
            const data = await res.json();
            
            let html = `<table><tr><th>${mode === 'daily' ? 'วันที่' : 'เดือน'}</th><th>ประเภท</th><th>ยอดรวม</th></tr>`;
            
            data.forEach(item => {
                // ใช้ item.date ตามที่ Backend ส่งมา (จากคำสั่ง AS date)
                let displayDate = item.date;

                // ตัดส่วนเวลาออกให้เหลือแค่ YYYY-MM-DD
                if (displayDate && displayDate.includes('T')) {
                    displayDate = displayDate.split('T')[0];
                }

                html += `<tr>
                    <td>${displayDate || "ไม่ระบุ"}</td>
                    <td>${item.type}</td>
                    <td>${item.total}</td>
                </tr>`;
            });
            
            html += '</table>';
            document.getElementById('reportDisplay').innerHTML = html;
        }
    </script>
</body>
</html>
