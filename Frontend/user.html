<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>รายการสินค้า - สำหรับลูกค้า</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ตกแต่งเพิ่มให้ดูเป็นมิตรกับลูกค้า */
        .status-ok { color: green; font-weight: bold; }
        .status-low { color: orange; font-weight: bold; }
        .status-out { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛒 รายการสินค้าพร้อมจำหน่าย</h1>

        <div class="card">
            <h2>👤 ข้อมูลผู้ใช้งานในระบบ</h2>
            <div id="userDisplay"></div>
        </div>

        <div class="card">
            <h2>📋 รายการสินค้าทั้งหมด</h2>
            <div id="allProductsDisplay"></div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:3000';

        window.onload = () => {
            loadAllProducts();
            loadUsers();
        };

        // ดึงสินค้ามาโชว์ (ตัดปุ่มจัดการออก)
        async function loadAllProducts() {
            try {
                const res = await fetch(`${API}/all-products`);
                const data = await res.json();
                
                let html = '<table><tr><th>ชื่อสินค้า</th><th>สถานะ</th><th>จำนวนคงเหลือ</th></tr>';
                data.forEach(item => {
                    let status = '<span class="status-ok">พร้อมส่ง</span>';
                    if (item.quantity <= 0) status = '<span class="status-out">สินค้าหมด</span>';
                    else if (item.quantity <= item.min_stock) status = '<span class="status-low">ใกล้หมด</span>';

                    html += `<tr>
                                <td><strong>${item.name}</strong></td>
                                <td>${status}</td>
                                <td>${item.quantity}</td>
                             </tr>`;
                });
                html += '</table>';
                document.getElementById('allProductsDisplay').innerHTML = data.length ? html : '<p>ไม่มีสินค้า</p>';
            } catch (error) {
                document.getElementById('allProductsDisplay').innerHTML = '<p style="color:red;">เชื่อมต่อเซิร์ฟเวอร์ไม่ได้</p>';
            }
        }

        // ดึงข้อมูล User (ตามที่คุณต้องการโชว์ aaa)
        async function loadUsers() {
            try {
                const res = await fetch(`${API}/all-users`);
                const data = await res.json();
                let html = '<table><tr><th>ID</th><th>Username</th><th>Role</th></tr>';
                data.forEach(user => {
                    html += `<tr><td>${user.id}</td><td>${user.username}</td><td>${user.role}</td></tr>`;
                });
                document.getElementById('userDisplay').innerHTML = html + '</table>';
            } catch (e) { console.error(e); }
        }
    </script>
</body>
</html>
